<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS AI Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: 
                repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0, 180, 0, 0.12) 60px, rgba(0, 180, 0, 0.12) 62px),
                repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(0, 180, 0, 0.12) 60px, rgba(0, 180, 0, 0.12) 62px),
                linear-gradient(135deg, #000000 0%, #0a1f0a 100%);
            min-height: 100vh;
            color: #e0e0e0;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 200, 0, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(50, 200, 50, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            font-family: 'Syne', sans-serif;
            background: linear-gradient(135deg, #64c8ff 0%, #ff64e6 50%, #64c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
            text-shadow: 0 0 30px rgba(100, 200, 255, 0.2);
        }

        .header p {
            font-size: 1.1rem;
            color: #b0b0e0;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .chat-container {
            background: rgba(10, 10, 15, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(0, 200, 0, 0.3);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3),
                        inset 0 0 20px rgba(0, 180, 0, 0.1);
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(0, 180, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(0, 180, 0, 0.08), rgba(0, 150, 0, 0.08));
        }

        .chat-title {
            font-weight: 700;
            color: #64c8ff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-title i {
            color: #ff64e6;
            font-size: 1.4rem;
        }

        .header-controls {
            display: flex;
            gap: 12px;
        }

        .export-btn, .clear-btn {
            background: linear-gradient(135deg, #64c8ff 0%, #6464ff 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.3);
        }

        .clear-btn {
            background: linear-gradient(135deg, #ff6464 0%, #ff64e6 100%);
            box-shadow: 0 0 15px rgba(255, 100, 230, 0.3);
        }

        .export-btn:hover, .clear-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 25px rgba(100, 200, 255, 0.6);
        }

        .clear-btn:hover {
            box-shadow: 0 0 25px rgba(255, 100, 230, 0.6);
        }

        .export-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 500px;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(0, 200, 0, 0.4);
            border-radius: 3px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 200, 0, 0.7);
        }

        .message {
            display: flex;
            margin-bottom: 12px;
            animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #64c8ff 0%, #6464ff 100%);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 8px 24px rgba(100, 200, 255, 0.25);
        }

        .message.bot .message-content {
            background: rgba(10, 40, 20, 0.6);
            backdrop-filter: blur(10px);
            color: #e0e0e0;
            border: 1px solid rgba(0, 180, 0, 0.3);
            border-bottom-left-radius: 4px;
            box-shadow: 0 8px 24px rgba(0, 180, 0, 0.15);
        }

        .message.bot:first-child .message-content {
            background: linear-gradient(135deg, rgba(0, 180, 0, 0.15), rgba(0, 150, 0, 0.15));
            border: 1px solid rgba(0, 200, 0, 0.4);
            color: #64ff64;
        }

        .typing {
            display: flex;
            gap: 6px;
            padding: 14px 18px;
            background: rgba(10, 40, 20, 0.6);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(0, 180, 0, 0.3);
            width: fit-content;
            margin-bottom: 12px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #64c8ff;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.6);
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        .input-container {
            background: rgba(10, 10, 15, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 30px;
            border: 1px solid rgba(0, 200, 0, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3),
                        inset 0 0 20px rgba(0, 180, 0, 0.08);
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid rgba(0, 180, 0, 0.3);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            background: rgba(10, 30, 15, 0.5);
            color: #e0e0e0;
            backdrop-filter: blur(10px);
        }

        .input-wrapper input:focus {
            border-color: #00ff00;
            box-shadow: 0 0 20px rgba(0, 200, 0, 0.4), inset 0 0 10px rgba(0, 200, 0, 0.1);
            background: rgba(10, 30, 15, 0.7);
        }

        .input-wrapper input::placeholder {
            color: #808080;
        }

        .send-btn {
            background: linear-gradient(135deg, #64c8ff 0%, #6464ff 100%);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.4);
        }

        .send-btn:hover {
            transform: scale(1.08) rotate(8deg);
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.8);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #808080;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: #64c8ff;
            font-weight: 700;
        }

        .empty-state p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #a0a0c0;
            max-width: 400px;
        }

        .error-message {
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.2), rgba(255, 100, 230, 0.2));
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.4);
        }

        .source-attribution {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(100, 200, 255, 0.2);
            font-size: 11px;
        }

        .source-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            border-left: 3px solid;
            background: rgba(100, 200, 255, 0.1);
            color: #64c8ff;
            border-left-color: #64c8ff;
        }

        .source-badge.policy {
            background: rgba(100, 255, 100, 0.1);
            border-left-color: #64ff64;
            color: #64ff64;
        }

        .source-badge.api {
            background: rgba(255, 150, 100, 0.1);
            border-left-color: #ff9664;
            color: #ff9664;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            40% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header h1 {
                font-size: 2.2rem;
            }

            .chat-header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .header-controls {
                width: 100%;
                justify-content: flex-end;
            }

            .messages {
                padding: 15px;
            }

            .input-container {
                padding: 15px 20px;
                flex-direction: column;
                gap: 10px;
            }

            .message-content {
                max-width: 85%;
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 41, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(100, 200, 255, 0.2);
            border-top: 3px solid #64c8ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>HRMS AI Assistant</h1>
            <p>Your intelligent HR companion powered by AI</p>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <div class="chat-title">
                    <i class="fas fa-brain"></i> HRMS AI Assistant
                </div>
                <div class="header-controls">
                    <button class="export-btn" id="exportBtn" disabled>
                        <i class="fas fa-download"></i>
                        Export PDF
                    </button>
                    <button class="clear-btn" id="clearBtn" disabled>
                        <i class="fas fa-trash-alt"></i>
                        Clear Chat
                    </button>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="empty-state">
                    <div class="icon">🤖</div>
                    <h3>Welcome to HRMS AI</h3>
                    <p>Ask me anything about HR policies, employee benefits, payroll, or any HR-related questions. I'm here to help!</p>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Type your HR question here..." autocomplete="off">
            </div>
            <button class="send-btn" id="sendBtn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesContainer = document.getElementById('messages');
        const exportBtn = document.getElementById('exportBtn');
        const clearBtn = document.getElementById('clearBtn');

        let isLoading = false;
        let messageCount = 0;

        // Initialize
        messageInput.focus();

        // Clear chat function
        function clearChat() {
            if (messageCount === 0) return;
            
            if (confirm('Are you sure you want to clear the entire chat history?')) {
                messagesContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🤖</div>
                        <h3>Chat Cleared</h3>
                        <p>Ready for a new conversation! Ask me anything about HR policies, employee benefits, payroll, or any HR-related questions.</p>
                    </div>
                `;
                messageCount = 0;
                updateButtons();
            }
        }

        // Update button states
        function updateButtons() {
            exportBtn.disabled = messageCount === 0;
            clearBtn.disabled = messageCount === 0;
        }

        // Send message function
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;
            messageInput.value = '';

            // Clear empty state
            const emptyState = messagesContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            // Add user message
            addMessage(message, 'user');

            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: message })
                });

                typingDiv.remove();

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                // Separate answer from embedded source
                let answerText = data.answer;
                let sourceText = data.source;
                
                // Remove embedded source from answer if present
                if (answerText.includes('\n\nSource:')) {
                    const parts = answerText.split('\n\nSource:');
                    answerText = parts[0].trim();
                }
                
                // Add message with source
                addMessage(answerText, 'bot', false, sourceText);
                messageCount++;
                updateButtons();

            } catch (error) {
                typingDiv.remove();
                addMessage('Sorry, I encountered an error processing your request. Please try again.', 'bot', true);
                console.error('Error:', error);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        // Add message to chat
        function addMessage(text, sender, isError = false, source = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            if (isError) {
                contentDiv.classList.add('error-message');
            }
            contentDiv.textContent = text;

            messageDiv.appendChild(contentDiv);

            // Add source attribution if available
            if (source && sender === 'bot') {
                const sourceDiv = document.createElement('div');
                sourceDiv.className = 'source-attribution';

                const badge = document.createElement('span');
                badge.className = 'source-badge';

                // Determine source type
                if (source.includes('GET')) {
                    badge.classList.add('api');
                    const match = source.match(/GET\s+(\S+)/);
                    badge.textContent = `📡 API: ${match ? match[1] : 'HRMS API'}`;
                } else if (source.includes('Source:')) {
                    badge.classList.add('policy');
                    const policyName = source.replace('Source:', '').trim();
                    badge.textContent = `📋 Policy: ${policyName}`;
                } else {
                    badge.textContent = `ℹ️ ${source}`;
                }

                sourceDiv.appendChild(badge);
                messageDiv.appendChild(sourceDiv);
            }

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Update export button state
        function updateExportButton() {
            updateButtons();
        }

        // Export to PDF function
        function exportToPDF() {
            if (messageCount === 0) return;

            // Show loading overlay
            const loadingOverlay = document.createElement('div');
            loadingOverlay.className = 'loading-overlay';
            loadingOverlay.innerHTML = '<div class="loading-spinner"></div>';
            document.body.appendChild(loadingOverlay);

            // Clone the chat container for PDF
            const chatClone = document.querySelector('.chat-container').cloneNode(true);

            // Remove export and clear buttons from clone
            const exportBtnClone = chatClone.querySelector('#exportBtn');
            const clearBtnClone = chatClone.querySelector('#clearBtn');
            if (exportBtnClone) {
                exportBtnClone.remove();
            }
            if (clearBtnClone) {
                clearBtnClone.remove();
            }

            // Add PDF-specific styles to ensure black text
            const pdfStyles = document.createElement('style');
            pdfStyles.textContent = `
                .message-content {
                    color: #000000 !important;
                }
                .message.user .message-content {
                    background: #e0e0e0 !important;
                    border: 1px solid #cccccc !important;
                }
                .message.bot .message-content {
                    background: #ffffff !important;
                    border: 1px solid #cccccc !important;
                }
                .message.bot:first-child .message-content {
                    background: #f0f0f0 !important;
                }
                .error-message {
                    background: #ffcccc !important;
                    color: #000000 !important;
                    border: 1px solid #ff9999 !important;
                }
                .chat-title {
                    color: #000000 !important;
                }
            `;
            chatClone.appendChild(pdfStyles);

            // Configure PDF options
            const options = {
                margin: 1,
                filename: `HRMS_AI_Chat_${new Date().toISOString().split('T')[0]}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // Generate PDF
            html2pdf()
                .set(options)
                .from(chatClone)
                .save()
                .then(() => {
                    document.body.removeChild(loadingOverlay);
                })
                .catch((error) => {
                    document.body.removeChild(loadingOverlay);
                    console.error('PDF generation error:', error);
                    alert('Error generating PDF. Please try again.');
                });
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        exportBtn.addEventListener('click', exportToPDF);
        clearBtn.addEventListener('click', clearChat);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isLoading) {
                sendMessage();
            }
        });

        // Initialize buttons
        updateButtons();
    </script>
</body>
</html>
